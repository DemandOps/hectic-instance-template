# Fail2ban jail for Hectic analytics abuse
# Ban IPs that trigger analytics abuse detection (bots, rate limits, spam, honeypots).
#
# Install:
#   cp hectic-analytics.conf /etc/fail2ban/filter.d/
#   cp hectic-analytics-jail.conf /etc/fail2ban/jail.d/
#   systemctl reload fail2ban

[hectic-analytics]
enabled  = true
filter   = hectic-analytics
logpath  = /var/log/hectic/api.log
maxretry = 10
findtime = 300
bantime  = 3600
action   = iptables-multiport[name=hectic-analytics, port="80,443", protocol=tcp]
